services:
  # {{#SERVERPOD_ENABLE_POSTGRES}}
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: projectname
      POSTGRES_PASSWORD: "DB_PASSWORD"
    volumes:
      - projectname_data:/var/lib/postgresql/data
  # {{/SERVERPOD_ENABLE_POSTGRES}}

  # {{#SERVERPOD_ENABLE_REDIS}}
  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "REDIS_PASSWORD"
    environment:
      - REDIS_REPLICATION_MODE=master
  # {{/SERVERPOD_ENABLE_REDIS}}

  # {{#SERVERPOD_ENABLE_POSTGRES}}
  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: projectname_test
      POSTGRES_PASSWORD: "DB_TEST_PASSWORD"
    volumes:
      - projectname_test_data:/var/lib/postgresql/data
  # {{/SERVERPOD_ENABLE_POSTGRES}}

  # {{#SERVERPOD_ENABLE_REDIS}}
  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "REDIS_TEST_PASSWORD"
    environment:
      - REDIS_REPLICATION_MODE=master
  # {{/SERVERPOD_ENABLE_REDIS}}

volumes:
  projectname_data:
  projectname_test_data:
